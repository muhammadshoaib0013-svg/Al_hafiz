version: '3.8'

services:
  alhafiz-backend:
    build: .
    container_name: alhafiz-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    depends_on:
      - redis
    networks:
      - alhafiz-net

  redis:
    image: redis:7-alpine
    container_name: alhafiz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alhafiz-net

networks:
  alhafiz-net:
    driver: bridge

volumes:
  redis_data:
